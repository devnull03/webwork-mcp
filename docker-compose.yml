services:
  base:
    build:
      context: .
      dockerfile: Dockerfile
    image: webwork-mcp:latest
    # base is only used to build the image; the tunnel services depend on it
    profiles: [base]

  poke:
    container_name: webwork-mcp-poke
    build:
      context: .
      dockerfile: Dockerfile.poke
    image: webwork-mcp:poke
    env_file: .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PORT=${PORT:-9814}
      - HOST=0.0.0.0
      - ENV=PROD
      - POKE_NAME=${POKE_NAME:-Webwork MCP}
      - POKE_SHARE=${POKE_SHARE:-}
    volumes:
      - ./.env:/app/.env
      - ~/.config/poke:/root/.config/poke
    restart: unless-stopped

  cloudflared:
    container_name: webwork-mcp-cloudflared
    build:
      context: .
      dockerfile: Dockerfile.cloudflared
    image: webwork-mcp:cloudflared
    env_file: .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PORT=${PORT:-9814}
      - HOST=0.0.0.0
      - ENV=PROD
      - TUNNEL_TOKEN=${TUNNEL_TOKEN:-}
    volumes:
      - ./.env:/app/.env
    restart: unless-stopped
